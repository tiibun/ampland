name: Publish manifest

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Merge manifests
        run: |
          cargo run --quiet --bin manifest-merge -- --output installers.toml assets/manifest/*.toml

      - name: Write signing key
        env:
          MANIFEST_SIGNING_KEY: ${{ secrets.MANIFEST_SIGNING_KEY }}
        run: |
          if [ -z "$MANIFEST_SIGNING_KEY" ]; then
            echo "MANIFEST_SIGNING_KEY is not set" >&2
            exit 1
          fi
          printf "%s" "$MANIFEST_SIGNING_KEY" > signing_key.pem
          chmod 600 signing_key.pem

      - name: Sign manifest
        run: |
          openssl pkeyutl -sign -inkey signing_key.pem -rawin -in installers.toml -out installers.toml.sig.bin
          xxd -p -c 256 installers.toml.sig.bin > installers.toml.sig

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installers.toml
            installers.toml.sig
